# ─────────────────────────────────────────────────────────────────────────────
# GitLab CI – Deploy Node.js app via Ansible
#
# Required CI/CD variables  (Settings → CI/CD → Variables):
#   ENCODED_DEPLOY_SSH_KEY   Private key that matches the public key injected into the
#                    target VM via cloud-init / Terraform. Mark it as "File"
#                    type and masked. Ansible's inventory already points to
#                    ~/.ssh/id_rsa, so the before_script writes it there.
#
# Optional variable:
#   BUILD_ANSIBLE_IMAGE   Set to "true" to force a rebuild of the runner image
#                         (e.g. when updating Ansible or collections without
#                         touching the Dockerfile).
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - build
  - deploy

variables:
  ANSIBLE_FORCE_COLOR: "true"
  ANSIBLE_HOST_KEY_CHECKING: "false"
  ANSIBLE_RUNNER_IMAGE: $CI_REGISTRY_IMAGE/ansible-runner:latest

build:ansible-image:
  stage: build
  image: docker:27
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$ANSIBLE_RUNNER_IMAGE" ci/ansible/
    - docker push "$ANSIBLE_RUNNER_IMAGE"
  rules:
    - if: $BUILD_ANSIBLE_IMAGE == "true"
    - changes:
        - ci/ansible/Dockerfile
        - ci/ansible/requirements.yml
      when: always
    - when: never

deploy:
  stage: deploy
  image: $ANSIBLE_RUNNER_IMAGE
  needs:
    - job: build:ansible-image
      optional: true
  before_script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$ENCODED_DEPLOY_SSH_KEY" | base64 -d | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - ansible-playbook -i ansible/inventory/hosts.yml ansible/site.yml
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment:
    name: production
