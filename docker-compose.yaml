services:
  gitlab:
    image: gitlab/gitlab-ce:$GITLAB_TAG
    container_name: gitlab
    restart: always
    hostname: $GITLAB_HOSTNAME
    environment:
      GITLAB_OMNIBUS_CONFIG: external_url 'http://$GITLAB_HOSTNAME';
    ports:
      - "80:80"
      - "443:443"
      - "22:22"
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    shm_size: "256m"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/health"]
      interval: 15s
      timeout: 10s
      retries: 12
    networks:
      - gitlab_net

  runner1:
    image: gitlab/gitlab-runner:$RUNNER_TAG
    container_name: runner1
    restart: always
    hostname: $RUNNER_HOSTNAME
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - runner1_config:/etc/gitlab-runner
    networks:
      - gitlab_net

    healthcheck:
      test: ["CMD", "gitlab-runner", "verify"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  gitlab_net:

volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  runner1_config:
