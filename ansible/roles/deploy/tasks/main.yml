- name: Install dependencies
  become: true
  ansible.builtin.package:
    name:
      - git
      - acl

- name: Ensure web user exists
  become: true
  ansible.builtin.user:
    name: "{{ web_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure deploy directory exists and is owned by web user
  become: true
  ansible.builtin.file:
    path: "{{ deploy_dir }}"
    state: directory
    owner: "{{ web_user }}"
    group: "{{ web_user }}"
    mode: "0755"

- name: Pull latest code from repo
  become: true
  become_user: "{{ web_user }}"
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ deploy_dir }}"
    version: "{{ repo_branch }}"
    update: true
    clone: true

- name: Set correct file permissions
  become: true
  ansible.builtin.file:
    path: "{{ deploy_dir }}"
    owner: "{{ web_user }}"
    group: "{{ web_user }}"
    recurse: true
