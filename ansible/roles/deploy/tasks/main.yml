- name: Ensure deploy directory exists
  become: true
  ansible.builtin.file:
    path: "{{ deploy_dir }}"
    state: directory
    owner: "{{ web_user }}"
    group: "{{ web_user }}"
    mode: "0755"

- name: Sync app files to VM
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../app/"
    dest: "{{ deploy_dir }}/"
    delete: true
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.git"
      - "--exclude=.env"

- name: Copy .env file (only if it does not already exist)
  become: true
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../app/.env.example"
    dest: "{{ deploy_dir }}/.env"
    owner: "{{ web_user }}"
    group: "{{ web_user }}"
    mode: "0640"
    force: false

- name: Install npm dependencies
  community.general.npm:
    path: "{{ deploy_dir }}"
    state: present

- name: Start or restart app with pm2
  ansible.builtin.shell:
    cmd: >
      pm2 describe app > /dev/null 2>&1
      && pm2 restart app --update-env
      || pm2 start src/index.js --name app
    chdir: "{{ deploy_dir }}"
  changed_when: true

- name: Save pm2 process list
  ansible.builtin.command:
    cmd: pm2 save
  changed_when: true
