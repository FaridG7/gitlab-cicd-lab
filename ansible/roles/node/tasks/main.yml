- name: Install Node.js and npm
  become: true
  ansible.builtin.apt:
    name:
      - nodejs
      - npm
    state: present
    update_cache: true

- name: Install pm2 globally
  become: true
  community.general.npm:
    name: pm2
    global: true
    state: present

- name: Check if pm2 systemd service is already configured
  ansible.builtin.stat:
    path: "/etc/systemd/system/pm2-{{ web_user }}.service"
  register: pm2_service

- name: Configure pm2 to start on boot
  become: true
  ansible.builtin.command:
    cmd: "pm2 startup systemd -u {{ web_user }} --hp /home/{{ web_user }}"
  when: not pm2_service.stat.exists
  changed_when: true
