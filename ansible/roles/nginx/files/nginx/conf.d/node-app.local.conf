# Upstream block — defines where Node.js is listening
upstream node_app {
  server 127.0.0.1:3000;
  keepalive 64;  # keep persistent connections open to Node.js
}

# HTTP → HTTPS redirect
server {
  listen [::]:80;
  listen 80;

  server_name node-app.local;

  return 301 https://node-app.local$request_uri;
}

# HTTPS server — reverse proxy to Node.js
server {
  listen [::]:443 ssl http2;
  listen 443 ssl http2;

  server_name node-app.local;

  include h5bp/tls/ssl_engine.conf;
  include h5bp/tls/certificate_files.conf;
  include h5bp/tls/policy_balanced.conf;

  # Keep the h5bp security rules (hides dot-files, blocks backup files, etc.)
  include h5bp/basic.conf;

  location / {
    proxy_pass http://node_app;

    # Tell Node.js the real client IP and protocol
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Required for HTTP/1.1 keepalive and WebSocket support
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
  }
}
